<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Day 43 Auth App</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f0f2f5; display: flex; flex-direction: column; align-items: center; padding: 50px; }
        .container { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 300px; margin-bottom: 20px; }
        h2 { text-align: center; color: #333; margin-top: 0; }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; margin-top: 10px; }
        button:hover { background: #0056b3; }
        .response-box { background: #333; color: #0f0; padding: 15px; border-radius: 4px; font-family: monospace; white-space: pre-wrap; width: 100%; box-sizing: border-box; min-height: 100px; border: 1px solid #000; }
        .success-btn { background: #28a745; margin-bottom: 20px; }
        .success-btn:hover { background: #218838; }
        h1 { margin-bottom: 40px; color: #333; }
    </style>
</head>
<body>
    <h1>Day 43: JWT Auth & MongoDB</h1>
    
    <div style="display: flex; gap: 20px;">
        <div class="container">
            <h2>Register</h2>
            <form id="registerForm">
                <input type="text" id="regName" placeholder="Name" required>
                <input type="email" id="regEmail" placeholder="Email" required>
                <input type="password" id="regPassword" placeholder="Password" required>
                <button type="submit">Register</button>
            </form>
        </div>

        <div class="container">
            <h2>Login</h2>
            <form id="loginForm">
                <input type="email" id="loginEmail" placeholder="Email" required>
                <input type="password" id="loginPassword" placeholder="Password" required>
                <button type="submit">Login</button>
            </form>
        </div>
    </div>

    <div class="container" style="width: 620px;">
        <h2>Test Protected Route</h2>
        <button id="testBtn" class="success-btn">Get Protected Data</button>
        <h3 style="margin-top: 0; margin-bottom: 10px;">Server Response:</h3>
        <div id="responseArea" class="response-box">Awaiting action...</div>
    </div>

    <script src="script.js"></script>
</body>
</html>
